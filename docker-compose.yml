name: au-parfum

services:
  postgres:
    image: postgres:17-alpine
    container_name: au-parfum-postgres
    environment:
      POSTGRES_DB: au-parfum
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  deps:
    image: oven/bun:1.3.10
    container_name: au-parfum-deps
    working_dir: /app
    volumes:
      - .:/app
      - bun_cache:/root/.bun
    command: bun install

  server:
    image: oven/bun:1.3.10
    container_name: au-parfum-server
    working_dir: /app/apps/server
    volumes:
      - .:/app
      - bun_cache:/root/.bun
    command: bun run --hot src/index.ts
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/au-parfum
      BETTER_AUTH_SECRET: Df1RbXhDgmjBcUO9YDimr4tf78b3Ea82
      BETTER_AUTH_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3001
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      deps:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    image: oven/bun:1.3.10
    container_name: au-parfum-web
    working_dir: /app/apps/web
    volumes:
      - .:/app
      - bun_cache:/root/.bun
    command: bun run dev --host 0.0.0.0
    ports:
      - "3001:3001"
    environment:
      NUXT_PUBLIC_SERVER_URL: http://localhost:3000
    depends_on:
      deps:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
  bun_cache:
